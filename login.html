<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Worksheet System</title>
    <meta name="description" content="Login to the Worksheet System to access and manage your class files." />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="auth-page">
    <div class="card">
      <img class="card-logo" src="photo/abune.jpg" alt="School Logo" />
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your worksheet portal</p>

      <div class="field">
        <label for="loginId">ID Number</label>
        <input
          id="loginId"
          type="text"
          placeholder="Enter your ID number"
          autocomplete="off"
        />
      </div>

      <button id="loginBtn" class="btn-primary" onclick="login()">
        Sign In
      </button>

      <p class="auth-link">Don't have an account? <a href="register.html">Create one</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
